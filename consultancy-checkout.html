<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consultancy Checkout — Shubhmay</title>
  <link rel="icon" href="/favicon/favicon.ico" sizes="any" />
  <style>
    :root {
      --cream: #faf6ee;
      --ivory: #f2e8d0;
      --gold: #b8922a;
      --gold-pale: #edd98a;
      --deep: #130307;
      --deep-2: #1e0509;
      --red: #8b1014;
      --red-btn: #c0191f;
      --red-dark: #7a0c10;
      --charcoal: #2e1a10;
      --muted: #7a6040;
      --bdr: rgba(184, 146, 42, 0.22);
      --ok: #4a8a3a;
      --err: #b42323;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
    }
    body {
      font-family: "DM Sans", system-ui, sans-serif;
      color: var(--charcoal);
      background: linear-gradient(180deg, var(--cream), #fff);
      min-height: 100vh;
    }
    .wrap {
      width: 100%;
      max-width: 1080px;
      margin: 0 auto;
      padding: 14px;
      overflow-x: clip;
    }
    .top {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 14px;
      padding: 12px 12px;
      background: linear-gradient(180deg, var(--red), var(--red-dark));
      border-radius: 10px;
      box-shadow: 0 10px 24px rgba(139, 16, 20, 0.2);
    }
    .top a {
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .pill {
      border: 1px solid rgba(255, 255, 255, 0.35);
      color: rgba(255, 255, 255, 0.86);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 12px;
      font-family: "Cinzel", serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .layout { display: grid; grid-template-columns: 1fr; gap: 12px; min-width: 0; }
    .card {
      background: #fff;
      border: 1px solid var(--bdr);
      border-radius: var(--radius);
      padding: 14px;
      box-shadow: 0 10px 28px rgba(184, 146, 42, 0.12);
      min-width: 0;
    }
    h1 {
      font-family: "Cinzel", serif;
      font-size: 1.15rem;
      color: var(--deep);
      margin-bottom: 6px;
      letter-spacing: 0.02em;
    }
    .sub {
      color: var(--muted);
      margin-bottom: 10px;
      line-height: 1.5;
      font-family: "Cormorant Garamond", serif;
      font-size: 1.02rem;
      font-style: italic;
    }
    .slot-picker {
      border: 1px solid var(--bdr);
      border-radius: 12px;
      padding: 12px;
      background: linear-gradient(180deg, #fff, #fcf8ef);
      max-width: 100%;
      overflow: hidden;
    }
    .date-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 6px;
      margin-bottom: 10px;
      max-width: 100%;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .date-tabs::-webkit-scrollbar { display: none; }
    .date-tab {
      border: 1px solid var(--bdr);
      background: #fff;
      color: var(--charcoal);
      border-radius: 10px;
      padding: 8px 12px;
      min-width: 96px;
      text-align: center;
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.03em;
      transition: all 0.2s ease;
      font-family: "Cinzel", serif;
      flex: 0 0 auto;
    }
    .date-tab:hover { border-color: var(--gold); background: rgba(184, 146, 42, 0.08); }
    .date-tab.active {
      border-color: var(--gold);
      background: linear-gradient(140deg, rgba(184, 146, 42, 0.2), rgba(184, 146, 42, 0.08));
      color: var(--deep);
    }
    .date-tab small {
      display: block;
      margin-top: 2px;
      font-size: 9px;
      font-family: "DM Sans", sans-serif;
      letter-spacing: 0;
      color: var(--muted);
      font-weight: 600;
    }
    .slots-head {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--red);
      margin: 4px 0 8px;
      font-family: "Cinzel", serif;
    }
    .slot-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      width: 100%;
    }
    .slot-btn {
      border: 1px solid var(--bdr);
      background: #fff;
      color: var(--charcoal);
      border-radius: 8px;
      padding: 11px 10px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.2s ease;
    }
    .slot-btn:hover { border-color: var(--gold); background: rgba(184, 146, 42, 0.07); }
    .slot-btn.active {
      border-color: var(--gold);
      background: linear-gradient(140deg, rgba(184, 146, 42, 0.18), rgba(184, 146, 42, 0.06));
      color: var(--deep);
    }
    .slot-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .f { margin-bottom: 12px; }
    .f label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .f input, .f textarea {
      width: 100%;
      border: 1px solid var(--bdr);
      background: #fff;
      color: var(--charcoal);
      border-radius: 8px;
      padding: 11px 12px;
      font-size: 14px;
    }
    .f input:focus, .f textarea:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(184, 146, 42, 0.2);
    }
    .f textarea { min-height: 90px; resize: vertical; }
    .grid2 { display: grid; grid-template-columns: 1fr; gap: 10px; }
    .btn {
      width: 100%;
      border: 0;
      border-radius: 999px;
      padding: 12px 14px;
      background: linear-gradient(145deg, var(--red-btn), var(--red-dark));
      color: #fff;
      font-family: "Cinzel", serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(139, 16, 20, 0.28);
    }
    .btn:hover { filter: brightness(1.05); }
    .msg { margin-top: 10px; font-size: 13px; color: var(--muted); }
    .msg.err { color: var(--err); }
    .msg.ok { color: var(--ok); }
    .bill {
      margin-top: 12px;
      border: 1px solid var(--bdr);
      border-radius: 10px;
      background: #fcf8ef;
      padding: 12px;
    }
    .bill h2 {
      font-family: "Cinzel", serif;
      font-size: 0.95rem;
      color: var(--deep);
      margin-bottom: 8px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .bill-row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 13px;
      color: var(--charcoal);
      padding: 4px 0;
    }
    .bill-row.total {
      margin-top: 4px;
      padding-top: 8px;
      border-top: 1px dashed var(--bdr);
      font-weight: 800;
      color: var(--deep);
    }

    @media (min-width: 640px) {
      .wrap { padding: 18px; }
      .top {
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 14px 16px;
      }
      .card { padding: 18px; }
      .grid2 { grid-template-columns: 1fr 1fr; }
      .slot-row { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
    }

    @media (min-width: 901px) {
      .layout { grid-template-columns: 1.1fr 0.9fr; gap: 18px; }
      .wrap { padding: 24px; }
      .card { padding: 22px; }
      h1 { font-size: 1.45rem; margin-bottom: 8px; }
      .sub { font-size: 1.15rem; margin-bottom: 14px; line-height: 1.65; }
    }
  </style>
  <script src="/js/shubhmay-track.js"></script>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <a href="/products/consultancy">← Consultancy</a>
      <span class="pill" id="tz">Timezone: IST</span>
    </div>

    <div class="layout">
      <section class="card">
        <h1>Select Available Slot</h1>
        <p class="sub">Pick one available timing slot. Once you confirm booking, that slot gets reserved.</p>
        <div id="slotDays"></div>
        <p id="slotMsg" class="msg"></p>
      </section>

      <section class="card">
        <h1>Confirm Booking</h1>
        <p class="sub">Fill details and confirm your consultancy appointment.</p>
        <form id="bookForm" novalidate>
          <div class="f">
            <label>Name *</label>
            <input id="name" required />
          </div>
          <div class="grid2">
            <div class="f">
              <label>Email *</label>
              <input id="email" type="email" required />
            </div>
            <div class="f">
              <label>Phone *</label>
              <input id="phone" required />
            </div>
          </div>
          <div class="f">
            <label>Topic *</label>
            <input id="topic" placeholder="Career / Marriage / Health / Business" required />
          </div>
          <div class="f">
            <label>Notes (optional)</label>
            <textarea id="notes"></textarea>
          </div>
          <div class="f">
            <label>Selected slot</label>
            <input id="selectedSlot" readonly placeholder="Choose slot from left panel" />
          </div>
          <div class="bill" id="billBox">
            <h2>Bill summary</h2>
            <div class="bill-row"><span>Plan</span><strong id="billPlan">—</strong></div>
            <div class="bill-row"><span>Duration</span><strong id="billDuration">—</strong></div>
            <div class="bill-row"><span>Slot</span><strong id="billSlot">Not selected</strong></div>
            <div class="bill-row total"><span>Total</span><strong id="billTotal">—</strong></div>
          </div>
          <button id="confirmBtn" class="btn" type="submit">Confirm Booking</button>
          <p id="bookMsg" class="msg"></p>
        </form>
      </section>
    </div>
  </div>

  <script>
    (function () {
      var slotDaysEl = document.getElementById('slotDays');
      var slotMsgEl = document.getElementById('slotMsg');
      var bookMsgEl = document.getElementById('bookMsg');
      var selectedSlotEl = document.getElementById('selectedSlot');
      var form = document.getElementById('bookForm');
      var confirmBtn = document.getElementById('confirmBtn');
      var billPlanEl = document.getElementById('billPlan');
      var billDurationEl = document.getElementById('billDuration');
      var billSlotEl = document.getElementById('billSlot');
      var billTotalEl = document.getElementById('billTotal');
      var selectedSlot = null;
      var selectedLabel = '';
      var slotDays = [];
      var selectedDayIndex = 0;
      var consultancyCfg = null;
      var activePlan = null;

      var leadSession = (function () {
        if (window.ShubhmayTrack && typeof window.ShubhmayTrack.getSessionId === 'function') {
          return window.ShubhmayTrack.getSessionId();
        }
        var primary = 'shubhmay_sid';
        var legacy = 'sm_site_session';
        var s = null;
        try {
          s = localStorage.getItem(primary);
        } catch (e) {}
        if (!s) s = sessionStorage.getItem(primary) || sessionStorage.getItem(legacy);
        if (!s) {
          s = 's_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 11);
        }
        try {
          localStorage.setItem(primary, s);
        } catch (e) {}
        sessionStorage.setItem(primary, s);
        sessionStorage.setItem(legacy, s);
        try {
          localStorage.setItem(legacy, s);
        } catch (e) {}
        window._shubhmaySid = s;
        return s;
      })();
      window.__smLeadId = window.__smLeadId || null;
      if (window.ShubhmayTrack && typeof window.ShubhmayTrack.init === 'function') {
        window.ShubhmayTrack.init({
          sourcePage: 'consultancy-checkout',
          eventType: 'consultancy_checkout',
          meta: { page: 'consultancy_checkout', funnel: 'consultancy_checkout' },
        });
      }

      function upsertConsultancyLead(name, email, phone, topic, utm) {
        return fetch('/api/track/lead', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            session_id: leadSession,
            lead_id: window.__smLeadId || null,
            name: name,
            email: email,
            phone: phone,
            conversion_form: 'consultancy_checkout_form',
            source_page: 'consultancy-checkout',
            landing_path: window.location.pathname + window.location.search,
            referrer: document.referrer || '',
            document_referrer: document.referrer || '',
            user_agent: navigator.userAgent || '',
            client_language: navigator.language || '',
            screen_width: window.screen && window.screen.width,
            screen_height: window.screen && window.screen.height,
            utm_source: utm.utm_source || '',
            utm_medium: utm.utm_medium || '',
            utm_campaign: utm.utm_campaign || '',
            utm_content: utm.utm_content || '',
            utm_term: utm.utm_term || '',
            meta: { topic: topic || '' }
          })
        })
          .then(function (r) { return r.json(); })
          .then(function (j) {
            if (j && j.leadId) window.__smLeadId = j.leadId;
          })
          .catch(function () {});
      }

      function msg(el, text, type) {
        el.textContent = text || '';
        el.className = 'msg' + (type ? ' ' + type : '');
      }

      function renderSlotPicker() {
        slotDaysEl.innerHTML = '';
        if (!Array.isArray(slotDays) || !slotDays.length) return;
        if (selectedDayIndex < 0 || selectedDayIndex >= slotDays.length) selectedDayIndex = 0;

        var picker = document.createElement('div');
        picker.className = 'slot-picker';

        var tabs = document.createElement('div');
        tabs.className = 'date-tabs';
        slotDays.forEach(function (d, i) {
          var t = document.createElement('button');
          t.type = 'button';
          t.className = 'date-tab' + (i === selectedDayIndex ? ' active' : '');
          var parts = String(d.label || '').split(',');
          var day = (parts[0] || '').trim();
          var date = (parts.slice(1).join(',') || d.date || '').trim();
          t.innerHTML = '<div>' + day + '</div><small>' + date + '</small>';
          t.addEventListener('click', function () {
            selectedDayIndex = i;
            // reset selected slot if day changed
            selectedSlot = null;
            selectedLabel = '';
            selectedSlotEl.value = '';
            syncBill();
            renderSlotPicker();
          });
          tabs.appendChild(t);
        });
        picker.appendChild(tabs);

        var head = document.createElement('div');
        head.className = 'slots-head';
        head.textContent = 'Available time slots';
        picker.appendChild(head);

        var row = document.createElement('div');
        row.className = 'slot-row';
        var activeDay = slotDays[selectedDayIndex];
        (activeDay.slots || []).forEach(function (s) {
          var b = document.createElement('button');
          b.type = 'button';
          b.className = 'slot-btn' + (selectedSlot === s.startIso ? ' active' : '');
          b.textContent = s.label;
          b.addEventListener('click', function () {
            selectedSlot = s.startIso;
            selectedLabel = activeDay.label + ' · ' + s.label + ' (IST)';
            selectedSlotEl.value = selectedLabel;
            syncBill();
            renderSlotPicker();
          });
          row.appendChild(b);
        });
        picker.appendChild(row);
        slotDaysEl.appendChild(picker);
      }

      function loadSlots() {
        msg(slotMsgEl, 'Loading slots…', '');
        fetch('/api/consultancy/slots')
          .then(function (r) { return r.json(); })
          .then(function (j) {
            if (!j.ok) throw new Error(j.error || 'Failed to load slots');
            slotDaysEl.innerHTML = '';
            if (!Array.isArray(j.days) || !j.days.length) {
              msg(slotMsgEl, 'No slots available right now. Please check again later.', 'err');
              return;
            }
            msg(slotMsgEl, '', '');
            slotDays = j.days || [];
            selectedDayIndex = 0;
            renderSlotPicker();
          })
          .catch(function (e) {
            msg(slotMsgEl, e.message || 'Could not load slots', 'err');
          });
      }

      function qsObj() {
        var q = {};
        (window.location.search || '')
          .replace(/^\?/, '')
          .split('&')
          .forEach(function (p) {
            if (!p) return;
            var i = p.indexOf('=');
            var k = i >= 0 ? decodeURIComponent(p.slice(0, i)) : decodeURIComponent(p);
            var v = i >= 0 ? decodeURIComponent(p.slice(i + 1)) : '';
            q[k] = v;
          });
        return q;
      }

      function money(paise) {
        var n = Number(paise || 0);
        if (!Number.isFinite(n)) n = 0;
        return '₹' + (n / 100).toLocaleString('en-IN');
      }

      function pickPlanFromQuery(plans) {
        var q = qsObj();
        var code = String(q.plan || q.plan_code || '').trim();
        if (!Array.isArray(plans) || !plans.length) return null;
        var found = plans.find(function (p) {
          return p.code === code;
        });
        return found || plans[0];
      }

      function syncBill() {
        if (!activePlan) return;
        billPlanEl.textContent = activePlan.name || activePlan.code || 'Consultancy';
        billDurationEl.textContent = String(activePlan.durationMinutes || 0) + ' mins';
        billSlotEl.textContent = selectedLabel || 'Not selected';
        billTotalEl.textContent = money(activePlan.amountPaise);
      }

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        var name = document.getElementById('name').value.trim();
        var email = document.getElementById('email').value.trim();
        var phone = document.getElementById('phone').value.trim();
        var topic = document.getElementById('topic').value.trim();
        var notes = document.getElementById('notes').value.trim();
        if (!name || !email || !phone || !topic) {
          msg(bookMsgEl, 'Please fill all required fields.', 'err');
          return;
        }
        if (!selectedSlot) {
          msg(bookMsgEl, 'Please select a slot first.', 'err');
          return;
        }
        if (!activePlan) {
          msg(bookMsgEl, 'Plan not loaded. Refresh page.', 'err');
          return;
        }
        if (typeof Razorpay === 'undefined') {
          msg(bookMsgEl, 'Razorpay could not load. Check internet and retry.', 'err');
          return;
        }
        confirmBtn.disabled = true;
        confirmBtn.textContent = 'Starting payment…';
        var q = qsObj();
        upsertConsultancyLead(name, email, phone, topic, q).then(function () {
          var commonPayload = {
            session_id: leadSession,
            lead_id: window.__smLeadId || null,
            name: name,
            email: email,
            phone: phone,
            topic: topic,
            notes: notes,
            slot_start: selectedSlot,
            plan_code: activePlan.code,
            source_page: 'consultancy-checkout',
            landing_path: window.location.pathname + window.location.search,
            referrer: document.referrer || '',
            utm_source: q.utm_source || '',
            utm_medium: q.utm_medium || '',
            utm_campaign: q.utm_campaign || '',
            utm_content: q.utm_content || '',
            utm_term: q.utm_term || ''
          };
          return fetch('/api/consultancy/order', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(commonPayload)
        })
          .then(function (r) {
            return r.json().then(function (j) {
              return { ok: r.ok, j: j };
            });
          })
          .then(function (res) {
            if (!res.ok || !res.j.ok) throw new Error((res.j && res.j.error) || 'Could not create payment order');
            var ord = res.j;
            var options = {
              key: ord.keyId,
              order_id: ord.orderId,
              name: 'Shubhmay Consultancy',
              description: (activePlan.name || 'Consultancy') + ' · ' + (activePlan.durationMinutes || 0) + ' mins',
              prefill: { name: name, email: email, contact: phone },
              handler: function (response) {
                confirmBtn.textContent = 'Confirming booking…';
                fetch('/api/consultancy/book', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify(
                    Object.assign({}, commonPayload, {
                      razorpay_order_id: response.razorpay_order_id,
                      razorpay_payment_id: response.razorpay_payment_id,
                      razorpay_signature: response.razorpay_signature
                    })
                  )
                })
                  .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
                  .then(function (bk) {
                    if (!bk.ok || !bk.j.ok) throw new Error((bk.j && bk.j.error) || 'Booking save failed');
                    msg(bookMsgEl, 'Payment successful. Booking confirmed for ' + selectedLabel + '.', 'ok');
                    form.reset();
                    selectedSlot = null;
                    selectedLabel = '';
                    selectedSlotEl.value = '';
                    syncBill();
                    loadSlots();
                  })
                  .catch(function (err) {
                    msg(bookMsgEl, err.message || 'Booking failed after payment', 'err');
                  })
                  .finally(function () {
                    confirmBtn.disabled = false;
                    confirmBtn.textContent = 'Confirm Booking';
                  });
              },
              modal: {
                ondismiss: function () {
                  msg(bookMsgEl, 'Payment cancelled.', 'err');
                  confirmBtn.disabled = false;
                  confirmBtn.textContent = 'Confirm Booking';
                }
              },
              theme: { color: '#8b1014' }
            };
            var rz = new Razorpay(options);
            rz.open();
          })
          .catch(function (err) {
            msg(bookMsgEl, err.message || 'Payment could not start', 'err');
          })
          .finally(function () {
            // Kept for order-create failures only; successful path re-enables after booking save.
            if (confirmBtn.disabled && confirmBtn.textContent === 'Starting payment…') {
              confirmBtn.disabled = false;
              confirmBtn.textContent = 'Confirm Booking';
            }
          });
        });
      });

      fetch('/api/consultancy/config')
        .then(function (r) { return r.json(); })
        .then(function (cfg) {
          if (!cfg.ok) throw new Error(cfg.error || 'Failed to load config');
          consultancyCfg = cfg;
          activePlan = pickPlanFromQuery(cfg.plans || []);
          syncBill();
          if (!cfg.razorpayReady) {
            msg(bookMsgEl, 'Razorpay is not configured on server.', 'err');
          }
          loadSlots();
        })
        .catch(function (e) {
          msg(bookMsgEl, e.message || 'Failed to load checkout config', 'err');
        });
    })();
  </script>
</body>
</html>
